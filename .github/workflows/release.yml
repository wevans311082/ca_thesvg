name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    # Skip version commits on push (prevents infinite loop).
    # workflow_dispatch always runs so you can manually trigger publish.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release): version packages')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Upgrade npm for OIDC provenance
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          cd packages/icons && npm run build && cd ../..
          cd packages/thesvg && node scripts/build-reexports.mjs && cd ../..
          cd packages/cli && npm run build && cd ../..
          cd packages/mcp && npm run build && cd ../..
          cd packages/react && npm run build && cd ../..
          cd packages/vue && npm run build && cd ../..
          cd packages/svelte && npm run build && cd ../..

      - name: Auto-generate changeset if missing
        id: auto-changeset
        run: |
          # Check if there are already pending changesets
          EXISTING=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Changeset already exists, skipping auto-generation"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect which packages changed in the last commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map changed directories to package names
          PACKAGES=""
          if echo "$CHANGED_FILES" | grep -q "^packages/icons/\|^icons/\|^public/icons/\|^src/data/icons\.json"; then
            PACKAGES="$PACKAGES \"@thesvg/icons\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/react/"; then
            PACKAGES="$PACKAGES \"@thesvg/react\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/vue/"; then
            PACKAGES="$PACKAGES \"@thesvg/vue\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/svelte/"; then
            PACKAGES="$PACKAGES \"@thesvg/svelte\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/thesvg/"; then
            PACKAGES="$PACKAGES \"thesvg\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/cli/"; then
            PACKAGES="$PACKAGES \"@thesvg/cli\": patch"$'\n'
          fi
          if echo "$CHANGED_FILES" | grep -q "^packages/mcp/"; then
            PACKAGES="$PACKAGES \"@thesvg/mcp-server\": patch"$'\n'
          fi

          # If icons changed, also bump framework packages (they re-export icons)
          if echo "$CHANGED_FILES" | grep -q "^packages/icons/\|^icons/\|^public/icons/\|^src/data/icons\.json"; then
            if ! echo "$PACKAGES" | grep -q "@thesvg/react"; then
              PACKAGES="$PACKAGES \"@thesvg/react\": patch"$'\n'
            fi
            if ! echo "$PACKAGES" | grep -q "@thesvg/vue"; then
              PACKAGES="$PACKAGES \"@thesvg/vue\": patch"$'\n'
            fi
            if ! echo "$PACKAGES" | grep -q "@thesvg/svelte"; then
              PACKAGES="$PACKAGES \"@thesvg/svelte\": patch"$'\n'
            fi
            if ! echo "$PACKAGES" | grep -q "\"thesvg\""; then
              PACKAGES="$PACKAGES \"thesvg\": patch"$'\n'
            fi
          fi

          if [ -z "$PACKAGES" ]; then
            echo "No publishable package changes detected"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract commit summary for changelog
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")

          # Generate changeset file
          CHANGESET_FILE=".changeset/auto-$(date +%s).md"
          {
            echo "---"
            echo "$PACKAGES"
            echo "---"
            echo ""
            echo "$COMMIT_MSG"
          } > "$CHANGESET_FILE"

          echo "Generated changeset: $CHANGESET_FILE"
          cat "$CHANGESET_FILE"

          echo "generated=true" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Version + commit + publish directly (no PR flow).
      # This avoids the GITHUB_TOKEN limitation where changesets/action
      # creates a "Version Packages" PR instead of publishing.
      - name: Version packages
        id: version
        run: |
          PENDING=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1 || true)
          if [ -n "$PENDING" ]; then
            echo "Found pending changesets, versioning..."
            pnpm changeset version
            git add .
            git commit -m "chore(release): version packages"
            git push origin main
            echo "versioned=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pending changesets, skipping version step"
            echo "versioned=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        run: |
          # OIDC provenance: npm authenticates via GitHub Actions OIDC token.
          # No NPM_TOKEN needed - packages are linked as trusted publishers.
          # We publish each package directly with --provenance (pnpm changeset publish doesn't pass it).
          PUBLISHED=false
          TAGS=""
          for PKG_DIR in packages/icons packages/thesvg packages/cli packages/mcp packages/react packages/vue packages/svelte; do
            if [ ! -d "$PKG_DIR" ]; then continue; fi
            PKG_NAME=$(node -p "require('./$PKG_DIR/package.json').name")
            PKG_VERSION=$(node -p "require('./$PKG_DIR/package.json').version")
            # Check if this version is already published
            if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
              echo "Skipping $PKG_NAME@$PKG_VERSION (already published)"
              continue
            fi
            echo "Publishing $PKG_NAME@$PKG_VERSION..."
            cd "$PKG_DIR"
            npm publish --provenance --access public || { echo "Failed to publish $PKG_NAME"; cd -; continue; }
            cd -
            PUBLISHED=true
            TAGS="$TAGS $PKG_NAME@$PKG_VERSION"
          done
          if [ "$PUBLISHED" = "true" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$TAGS" | tr ' ' '\n' | grep -v '^$' > /tmp/published-tags.txt
          else
            echo "No new packages to publish"
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tags and GitHub releases
        if: steps.publish.outputs.published == 'true'
        run: |
          if [ -f /tmp/published-tags.txt ]; then
            while IFS= read -r TAG; do
              if [ -n "$TAG" ] && ! git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "Creating tag: $TAG"
                git tag "$TAG"
                git push origin "$TAG" || true
                gh release create "$TAG" --title "$TAG" --generate-notes || true
              fi
            done < /tmp/published-tags.txt
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
