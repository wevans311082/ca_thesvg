name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Configure npm for OIDC publishing
        run: |
          npm install -g npm@latest
          npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          cd packages/icons && npm run build && cd ../..
          cd packages/thesvg && node scripts/build-reexports.mjs && cd ../..
          cd packages/cli && npm run build && cd ../..
          cd packages/mcp && npm run build && cd ../..
          cd packages/react && npm run build && cd ../..
          cd packages/vue && npm run build && cd ../..
          cd packages/svelte && npm run build && cd ../..

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: "chore(release): version packages [skip ci]"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ""

      - name: Create git tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          ICONS_VERSION=$(node -p "require('./packages/icons/package.json').version")
          TAG="v${ICONS_VERSION}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
