name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Configure npm for OIDC publishing
        run: |
          npm install -g npm@latest
          npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          cd packages/icons && npm run build && cd ../..
          cd packages/thesvg && node scripts/build-reexports.mjs && cd ../..
          cd packages/cli && npm run build && cd ../..
          cd packages/mcp && npm run build && cd ../..
          cd packages/react && npm run build && cd ../..
          cd packages/vue && npm run build && cd ../..
          cd packages/svelte && npm run build && cd ../..

      - name: Check for pending changesets
        id: check
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1 > /dev/null 2>&1; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: "chore(release): version packages [skip ci]"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ""

      - name: Create git tag for release
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Create per-package tags from publishedPackages
          PUBLISHED='${{ steps.changesets.outputs.publishedPackages }}'
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" != "[]" ]; then
            echo "$PUBLISHED" | jq -r '.[] | "\(.name)@\(.version)"' | while read TAG; do
              if ! git rev-parse "$TAG" >/dev/null 2>&1; then
                git tag "$TAG"
                git push origin "$TAG" || true
              fi
            done
          fi

      - name: Auto-merge Version Packages PR
        if: steps.check.outputs.has_changesets == 'true' && steps.changesets.outputs.published != 'true'
        run: |
          # Find the open Version Packages PR and enable auto-merge
          PR_NUMBER=$(gh pr list --state open --head changeset-release/main --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "Enabling auto-merge on Version Packages PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --squash --auto
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
